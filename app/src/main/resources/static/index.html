<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Role</title>
    <link rel="icon" href="./assets/images/logo/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div id="header"></div>

        <main class="main-content">
          <section id="role-selection" class="role-selection">
            <h2 id="role-heading">Select Your Role</h2>
            <div id="role-buttons" class="role-buttons">
              <button id="adminLogin" class="dashboard-btn" type="button">
                Admin
              </button>
              <button id="doctorLogin" class="dashboard-btn" type="button">
                Doctor
              </button>
              <button id="patientLogin" class="dashboard-btn" type="button">
                Patient
              </button>
            </div>
          </section>
        </main>

        <div id="footer"></div>
      </div>
    </div>

    <div id="modal" class="modal" style="display: none">
      <div class="modal-content">
        <span id="closeModal" class="close" role="button" aria-label="Close"
          >&times;</span
        >
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="./js/services/index.js" defer></script>
  </body>
</html>
